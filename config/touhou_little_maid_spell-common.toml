
#战斗系统相关配置
#Combat system configurations
[combat]
	#最大法术攻击范围 (默认: 24.0)
	#Maximum spell attack range
	#Range: 8.0 ~ 64.0
	maxSpellRange = 24.0
	#
	#近战攻击范围 (默认: 2.5)
	#Melee attack range
	#Range: 1.0 ~ 5.0
	meleeRange = 2.5
	#
	#远程攻击范围 (默认: 8.5)
	#Far attack range
	#Range: 1.0 ~ 20.0
	farRange = 8.5
	#
	#女仆伤害倍率 (默认: 1.0，仅在法术战斗任务下生效)
	#Maid damage multiplier(default:1.0,only effective on spellCombatTask)
	#Range: 0.0 ~ 50.0
	maidDamageMultiplier = 1.0
	#
	#女仆法术冷却倍率 (默认: 1.0，仅在法术战斗任务下生效)
	#Maid cooldown multiplier(default:1.0,only effective on spellCombatTask)
	#Range: 0.0 ~ 50.0
	maidCooldownMultiplier = 1.0
	#
	#近战法术任务攻击间隔（单位：tick，默认: 8）
	#Melee spell task attack interval (in ticks, default: 8)
	#Range: 1 ~ 100
	meleeAttackInterval = 8
	#
	#远程法术任务攻击间隔（单位：tick，默认: 5）
	#Far spell task attack interval (in ticks, default: 5)
	#Range: 1 ~ 100
	farAttackInterval = 5
	#
	#法术黑名单，女仆不会施放这些法术
	#Spell blacklist, maids will not cast these spells
	#示例: ["irons_spellbooks:spectral_hammer", "irons_spellbooks:firecracker"]
	#Example: ["irons_spellbooks:spectral_hammer", "irons_spellbooks:firecracker"]
	spellBlacklist = ["irons_spellbooks:spectral_hammer"]
	#
	#是否自动设置女仆与玩家结盟 (默认: true)
	#Whether to automatically set alliance between maids and players
	#结盟后，女仆与玩家将被加入同一队伍，禁止友军伤害
	#When allied, maids and players will be in the same team with friendly fire disabled
	autoAllianceEnabled = true

#饰品系统相关配置
#Bauble system configurations
[baubles]

	#伤害相关饰品配置
	#Damage-related bauble configurations
	[baubles.damage]
		#紫荆银冠反伤倍率 (默认: 0.8)
		#Silver Cercis true damage multiplier
		#Range: 0.1 ~ 2.0
		silverCercisTrueDamageMultiplier = 0.8
		#
		#烬血之戒最大伤害加成比例 (默认: 0.5)
		#Spring Ring maximum damage bonus ratio
		#Range: 0.1 ~ 1.0
		springRingMaxDamageBonus = 0.5

	#治疗相关饰品配置
	#Healing-related bauble configurations
	[baubles.healing]
		#流转核心每级好感生命恢复百分比 (默认: 0.025)
		#Flow Core health regeneration rate
		#Range: 0.001 ~ 0.3
		flowCoreHealthRegenRate = 0.025
		#
		#喋血之心治疗比例 (默认: 0.1)
		#Bleeding Heart heal ratio
		#Range: 0.01 ~ 1.0
		bleedingHeartHealRatio = 0.1

	#防御相关饰品配置
	#Defense-related bauble configurations
	[baubles.defense]
		#流转核心每级好感伤害减免比例 (默认: 0.15)
		#Flow Core damage reduction ratio
		#Range: 0.05 ~ 0.5
		flowCoreDamageReduction = 0.15
		#
		#双心链伤害分摊比例 (默认: 0.5)
		#主人和女仆各受到原伤害*比例的伤害
		#Double Heart Chain damage share ratio
		#Range: 0.1 ~ 0.9
		doubleHeartChainShareRatio = 0.5

	#功能相关饰品配置
	#Utility-related bauble configurations
	[baubles.utility]
		#时痕之戒每级好感冷却减少比例 (默认: 0.25)
		#Quick Chant Ring cooldown reduction ratio
		#Range: 0.1 ~ 0.8
		quickChantRingCooldownReduction = 0.25
		#
		#磐石魔晶击退抗性加成 (默认: 8)
		#Rock Crystal knockback resistance bonus
		#Range: 1 ~ 20
		rockCrystalKnockbackResistance = 8
		#
		#流转核心效果触发间隔 (tick) (默认: 10)
		#Flow Core effect trigger interval in ticks
		#Range: 1 ~ 100
		flowCoreTickInterval = 10
		#
		#发簪有益效果延长倍率 (默认: 1.15)
		#Hairpin beneficial effect extension multiplier
		#Range: 1.0 ~ 10.0
		hairpinBeneficialEffectExtension = 1.15
		#
		#发簪有益效果最小延长时间 (tick) (默认: 300)
		#Hairpin minimum extension ticks for beneficial effects
		#Range: 0 ~ 10000
		hairpinMinExtensionTicks = 300
		#
		#馥郁巧思进食好感度增长 (默认: 2)
		#Fragrant Ingenuity favorability gain when eating
		#Range: 1 ~ 10
		fragrantIngenuityFavorabilityGain = 2
		#
		#馥郁巧思喂食buff持续时间 (tick)
		#Fragrant Ingenuity buff duration when maid feeds owner
		#Range: 200 ~ 120000
		fragrantIngenuityBuffDuration = 2400
		#
		#春花-返最大层数 (默认: 3)
		#Spring Bloom Return maximum stack count
		#Range: 1 ~ 8
		springBloomReturnMaxStacks = 3
		#
		#春花-返每层持续时间 (tick) (默认: 400)
		#Spring Bloom Return stack duration in ticks
		#Range: 20 ~ 72000
		springBloomReturnStackDurationTicks = 400
		#
		#春花-返叠层获取冷却 (tick) (默认: 20)
		#Spring Bloom Return stack gain cooldown in ticks
		#Range: 0 ~ 1200
		springBloomReturnGainCooldownTicks = 20
		#
		#春花-返触发冷却 (tick) (默认: 200)
		#Spring Bloom Return trigger cooldown in ticks
		#Range: 0 ~ 72000
		springBloomReturnTriggerCooldownTicks = 200
		#
		#春花-返伤害触发固定阈值 (默认: 4.0)
		#Spring Bloom Return flat damage threshold
		#Range: 0.0 ~ 100.0
		springBloomReturnDamageThreshold = 4.0
		#
		#春花-返伤害触发最大生命比例阈值 (默认: 0.10)
		#Spring Bloom Return max health ratio threshold
		#Range: 0.0 ~ 1.0
		springBloomReturnDamageThresholdRatio = 0.1
		#
		#春花-返触发时等效回复比例 (默认: 0.05)
		#Spring Bloom Return heal ratio
		#Range: 0.0 ~ 1.0
		springBloomReturnHealRatio = 0.05
		#
		#春花-返触发时返还剩余法术冷却比例 (默认: 0.20)
		#Spring Bloom Return cooldown refund ratio
		#Range: 0.0 ~ 1.0
		springBloomReturnCooldownRefundRatio = 0.2
		#
		#馥郁巧思随机正面效果黑名单，黑名单内的效果不会被随机赋予
		#Fragrant Ingenuity random beneficial effect blacklist
		#默认值与梦云水晶黑名单相同
		fragrantIngenuityEffectBlacklist = ["irons_spellbooks:ascension", "irons_spellbooks:burning_dash", "irons_spellbooks:antigravity", "irons_spellbooks:volt_strike", "traveloptics:aqua_missiles_hover", "traveloptics:meteor_storm", "traveloptics:aerial_collapse", "traveloptics:aerial_collapse_helper", "soulsweapons:chungus_tonic_effect", "goety:fire_trail", "goety:charged", "goety:rampage", "goety:shadow_walk", "goety:fiery_aura", "goety:frosty_aura", "minecraft:invisibility", "irons_spellbooks:true_invisibility"]
		#
		#
		#春花-返识别治疗/增益法术的关键词
		#Spring Bloom Return support spell keywords
		springBloomReturnSupportSpellKeywords = ["heal", "healing", "cure", "cleanse", "regen", "regeneration", "ward", "shield", "barrier", "protect", "protection", "bless", "support", "recovery", "restore", "renew", "vigor", "aura", "buff", "haste", "fortify", "mend"]

	#触发机制相关饰品配置
	#Trigger mechanism bauble configurations
	[baubles.triggers]
		#紫荆银冠触发所需攻击次数 (默认: 3)
		#Silver Cercis required attack count to trigger
		#Range: 1 ~ 10
		silverCercisTriggerCount = 3
		#
		#紫荆银冠触发后冷却时间 (tick) (默认: 5)
		#Silver Cercis cooldown ticks after trigger
		#Range: 1 ~ 100
		silverCercisCooldownTicks = 5
		#
		#破愈咒锋每次攻击增加禁疗次数 (默认: 15)
		#Wound Rime Blade record duration
		#Range: 5 ~ 100
		woundRimeBladeRecordDuration = 15

	#特殊饰品配置
	#Special bauble configurations
	[baubles.special]
		#混沌之书真实伤害最小值 (默认: 5.0)
		#Chaos Book minimum true damage
		#Range: 1.0 ~ 50.0
		chaosBookTrueDamageMin = 5.0
		#
		#混沌之书真实伤害百分比 (默认: 0.01)
		#Chaos Book true damage percentage of max health
		#Range: 0.001 ~ 0.1
		chaosBookTrueDamagePercent = 0.01
		#
		#混沌之书伤害分割次数 (默认: 5)
		#Chaos Book damage split count
		#Range: 1 ~ 20
		chaosBookDamageSplitCount = 5
		#
		#混沌之书每次分割伤害最小值 (默认: 3.0)
		#Chaos Book minimum damage per split
		#Range: 0.1 ~ 100.0
		chaosBookMinSplitDamage = 3.0
		#
		#魂之书伤害阈值百分比 (默认: 0.2)
		#Soul Book damage threshold percentage of max health
		#Range: 0.05 ~ 1.0
		soulBookDamageThresholdPercent = 0.2
		#
		#魂之书伤害间隔阈值 (tick) (默认: 10)
		#Soul Book damage interval threshold in ticks
		#Range: 1 ~ 100
		soulBookDamageIntervalThreshold = 10
		#
		#梦云水晶随机正面效果黑名单，黑名单内的效果不会被随机赋予
		#Dream Crystal random beneficial effect blacklist
		#支持精确匹配和 regex: 前缀正则匹配
		#示例: ["minecraft:bad_omen", "regex:irons_spellbooks:.*"]
		dreamCrystalEffectBlacklist = ["irons_spellbooks:ascension", "irons_spellbooks:burning_dash", "irons_spellbooks:antigravity", "irons_spellbooks:volt_strike", "traveloptics:aqua_missiles_hover", "traveloptics:meteor_storm", "traveloptics:aerial_collapse", "traveloptics:aerial_collapse_helper", "soulsweapons:chungus_tonic_effect", "goety:fire_trail", "goety:charged", "goety:rampage", "goety:shadow_walk", "goety:fiery_aura", "goety:frosty_aura", "minecraft:invisibility", "irons_spellbooks:true_invisibility"]
		#
		#是否启用梦云水晶随机正面效果白名单 (默认: true)
		#Whether to enable Dream Crystal random beneficial effect whitelist
		dreamCrystalUseEffectWhitelist = true
		#
		#梦云水晶随机正面效果白名单，启用后只会从该列表中随机
		#Dream Crystal random beneficial effect whitelist
		#支持精确匹配和 regex: 前缀正则匹配
		#示例: ["minecraft:speed", "regex:minecraft:.*"]
		dreamCrystalEffectWhitelist = ["regex:minecraft:.*", "regex:goety:.*", "regex:irons_spellbooks:.*", "regex:ars_nouveau:.*", "regex:youkaishomecoming:.*", "regex:farmersdelight:.*", "regex:kaleidoscope_cookery:.*", "regex:alexsmobs:.*", "regex:alexscaves:.*", "regex:cataclysm::.*"]
		#
		#是否启用梦云水晶额外真实伤害 (默认: true)
		#Whether to enable Dream Crystal extra true damage
		dreamCrystalExtraTrueDamageEnabled = true
		#
		#是否启用梦云水晶冻结时设置无AI (默认: true)
		#Whether to enable setNoAi during Dream Crystal freeze
		dreamCrystalSetNoAiEnabled = true

#归隐之地维度相关配置
#Retreat dimension configurations
[retreat_dimension]
	#是否启用私人维度模式 (默认: true)
	#true: 每个玩家拥有独立的归隐之地维度
	#false: 所有玩家共享一个归隐之地维度，每个玩家拥有一个隐世之境结构
	#Whether to enable private dimension mode (default: true)
	#true: Each player has their own retreat dimension
	#false: All players share one retreat dimension, each with one structure
	enablePrivateDimensions = true
	#
	#共享模式下是否启用配额限制 (默认: true，仅在 enablePrivateDimensions=false 时生效)
	#true: 每个玩家只能搜索一次隐世之境，使用寻风之铃消耗配额
	#false: 不限制搜索次数，每次使用寻风之铃均可搜索
	#Whether to enable quota limit in shared mode (default: true, only effective when enablePrivateDimensions=false)
	enableSharedQuotaLimit = true

