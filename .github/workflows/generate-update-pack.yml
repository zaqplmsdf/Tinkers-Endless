name: Generate Update Pack

on:
  workflow_dispatch:
    inputs:
      old_ref:
        description: "Old ref"
        required: false
        default: ""
      new_ref:
        description: "New ref"
        required: false
        default: ""
      platform:
        description: "Update package platform"
        required: true
        type: choice
        options:
          - universal
          - client
          - server
        default: universal
      base:
        description: "Current base version"
        required: true
      base_new:
        description: "New base version"
        required: true
      dlc:
        description: "Current DLC version"
        required: true
      dlc_new:
        description: "New DLC version"
        required: true
      update_dlcm:
        description: "UpdateDLCM value (empty/true/version)"
        required: false
        default: ""
      sync_to_gitee:
        description: "Sync generated release to Gitee"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      sync_to_gitcode:
        description: "Sync generated release to GitCode"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.generate.outputs.release_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Validate version change
        shell: bash
        run: |
          BASE="${{ inputs.base }}"
          BASE_NEW="${{ inputs.base_new }}"
          DLC="${{ inputs.dlc }}"
          DLC_NEW="${{ inputs.dlc_new }}"
          if [ "$BASE" = "$BASE_NEW" ] && [ "$DLC" = "$DLC_NEW" ]; then
            echo "Invalid input: base/base_new and dlc/dlc_new are both unchanged." >&2
            echo "At least one side must change." >&2
            exit 1
          fi

      - name: Resolve diff base ref
        id: base_ref
        shell: bash
        run: |
          INPUT_OLD_REF="${{ inputs.old_ref }}"
          INPUT_NEW_REF="${{ inputs.new_ref }}"
          BASE="${{ inputs.base }}"
          DLC="${{ inputs.dlc }}"
          if [ -n "$INPUT_NEW_REF" ]; then
            if ! git rev-parse --verify --quiet "$INPUT_NEW_REF^{commit}" >/dev/null; then
              echo "Invalid new_ref: $INPUT_NEW_REF" >&2
              exit 1
            fi
            RESOLVED_TO_REF="$INPUT_NEW_REF"
          else
            RESOLVED_TO_REF="HEAD"
          fi

          if [ -n "$INPUT_OLD_REF" ]; then
            if ! git rev-parse --verify --quiet "$INPUT_OLD_REF^{commit}" >/dev/null; then
              echo "Invalid old_ref: $INPUT_OLD_REF" >&2
              exit 1
            fi
            RESOLVED="$INPUT_OLD_REF"
            SOURCE="input"
          else
            TARGET_PAIR_PLUS="${BASE}+${DLC}"
            TARGET_PAIR_UNDERSCORE="${BASE}_${DLC}"
            RESOLVED=""
            SOURCE=""

            tag_target_pair() {
              local tag="$1"
              if [[ "$tag" == */* ]]; then
                printf '%s\n' "${tag#*/}"
                return
              fi
              python3 - "$tag" <<'PY'
          import sys

          tag = sys.argv[1].strip()
          pair_delimiters = ["+", "_", "@", "~", " "]

          def parse_pair(value):
              value = (value or "").strip()
              for delimiter in pair_delimiters:
                  if delimiter == " ":
                      parts = value.split()
                      if len(parts) == 2 and parts[0].strip() and parts[1].strip():
                          return parts[0].strip(), parts[1].strip()
                      continue
                  index = value.find(delimiter)
                  if 0 < index < len(value) - len(delimiter):
                      left = value[:index].strip()
                      right = value[index + len(delimiter):].strip()
                      if left and right:
                          return left, right
              return None

          for index, ch in enumerate(tag):
              if ch != "-" or index <= 0 or index >= len(tag) - 1:
                  continue
              old_pair = parse_pair(tag[:index])
              new_pair = parse_pair(tag[index + 1:])
              if old_pair and new_pair:
                  print(f"{new_pair[0]}_{new_pair[1]}")
                  sys.exit(0)
          PY
            }

            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              right="$(tag_target_pair "$tag")"
              if [ "$right" = "$TARGET_PAIR_PLUS" ] || [ "$right" = "$TARGET_PAIR_UNDERSCORE" ]; then
                RESOLVED="$tag"
                SOURCE="target_pair_hot_update_tag"
                break
              fi
            done < <(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags)

            if [ -z "$RESOLVED" ]; then
              while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                right="$(tag_target_pair "$tag")"
                if [ -n "$right" ]; then
                  RESOLVED="$tag"
                  SOURCE="latest_hot_update_tag"
                  break
                fi
              done < <(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags)
            fi

            if [ -z "$RESOLVED" ]; then
              RESOLVED="$(git rev-list --max-parents=0 "$RESOLVED_TO_REF" | tail -n 1)"
              SOURCE="initial_commit"
            fi
          fi

          echo "resolved_from_ref=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "resolved_from_ref_source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "resolved_to_ref=$RESOLVED_TO_REF" >> "$GITHUB_OUTPUT"

      - name: Fetch changed Git LFS objects
        shell: bash
        run: |
          FROM_REF="${{ steps.base_ref.outputs.resolved_from_ref }}"
          TO_REF="${{ steps.base_ref.outputs.resolved_to_ref }}"

          if [ ! -f .gitattributes ]; then
            echo "No .gitattributes found, skip selective LFS fetch."
            exit 0
          fi
          if ! grep -qi "filter=lfs" .gitattributes; then
            echo "No LFS patterns in .gitattributes, skip selective LFS fetch."
            exit 0
          fi
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "git-lfs not found on runner, skip selective LFS fetch."
            exit 0
          fi

          mapfile -d '' changed_paths < <(
            git -c core.quotepath=false diff --name-only -z --diff-filter=ACMRTUXB "$FROM_REF" "$TO_REF" -- .
          )

          if [ "${#changed_paths[@]}" -eq 0 ]; then
            echo "No changed files detected, skip selective LFS fetch."
            exit 0
          fi

          include_list="$(
            printf '%s\n' "${changed_paths[@]}" \
              | sed '/^$/d' \
              | paste -sd, -
          )"

          if [ -z "$include_list" ]; then
            echo "No eligible changed paths for LFS fetch."
            exit 0
          fi

          echo "Fetching LFS objects only for changed paths..."
          git lfs install --local
          git lfs fetch origin "$TO_REF" --include="$include_list"

      - name: Generate update package
        id: generate
        run: |
          mkdir -p out
          result="$(
            python3 .github/tools/generate_update_pack.py \
              --from-ref "${{ steps.base_ref.outputs.resolved_from_ref }}" \
              --to-ref "${{ steps.base_ref.outputs.resolved_to_ref }}" \
              --platform "${{ inputs.platform }}" \
              --base "${{ inputs.base }}" \
              --base-new "${{ inputs.base_new }}" \
              --dlc "${{ inputs.dlc }}" \
              --dlc-new "${{ inputs.dlc_new }}" \
              --update-dlcm "${{ inputs.update_dlcm }}"
          )"
          echo "$result"
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "$line" >> "$GITHUB_OUTPUT"
            fi
          done <<< "$result"

      - name: Show generated info
        run: |
          echo "Old ref: ${{ steps.base_ref.outputs.resolved_from_ref }}"
          echo "New ref: ${{ steps.base_ref.outputs.resolved_to_ref }}"
          echo "Old ref source: ${{ steps.base_ref.outputs.resolved_from_ref_source }}"
          echo "Release tag suggestion: ${{ steps.generate.outputs.release_tag }}"
          echo "Asset name: ${{ steps.generate.outputs.asset_name }}"
          echo "Zip path: ${{ steps.generate.outputs.zip_path }}"
          echo "Added files: ${{ steps.generate.outputs.add_count }}"
          echo "Deleted files: ${{ steps.generate.outputs.del_count }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-package-${{ inputs.platform }}_${{ inputs.base_new }}_${{ inputs.dlc_new }}
          path: |
            ${{ steps.generate.outputs.zip_path }}
            ${{ steps.generate.outputs.summary_path }}
            ${{ steps.generate.outputs.changelog_path }}
            ${{ steps.generate.outputs.release_notes_path }}
            work/**/update.dc

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.generate.outputs.release_tag }}"
          ASSET="${{ steps.generate.outputs.zip_path }}"
          NOTES="${{ steps.generate.outputs.release_notes_path }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" --title "$TAG" --notes-file "$NOTES"
          fi

  sync_gitee:
    if: ${{ inputs.sync_to_gitee == 'true' }}
    needs: generate
    uses: ./.github/workflows/sync-github-release-to-gitee.yml
    with:
      tag: ${{ needs.generate.outputs.release_tag }}
      sync_all: "false"
      overwrite_assets: "true"
    secrets: inherit

  sync_gitcode:
    if: ${{ inputs.sync_to_gitcode == 'true' }}
    needs: generate
    uses: ./.github/workflows/sync-github-release-to-gitcode.yml
    with:
      tag: ${{ needs.generate.outputs.release_tag }}
      sync_all: "false"
      overwrite_assets: "true"
    secrets: inherit
